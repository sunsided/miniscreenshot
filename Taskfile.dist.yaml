# https://github.com/go-task/task
version: "3"

tasks:
  fmt:
    desc: Format the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo fmt

  lint:
    desc: Lint the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  lint:fix:
    desc: Lint and auto-fix the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo clippy --workspace --all-targets --fix --allow-staged

  test:
    desc: Run all workspace tests
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo test --workspace

  test:core:
    desc: Run tests for the core miniscreenshot crate only
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo test -p miniscreenshot

  build:
    desc: Build the workspace
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    sources:
      - Cargo.lock
      - Cargo.toml
      - miniscreenshot/Cargo.toml
      - miniscreenshot-softbuffer/Cargo.toml
      - miniscreenshot-wgpu/Cargo.toml
      - miniscreenshot-wayland/Cargo.toml
      - miniscreenshot-skia/Cargo.toml
      - miniscreenshot-vello/Cargo.toml
      - miniscreenshot-x11/Cargo.toml
      - miniscreenshot-portal/Cargo.toml
      - miniscreenshot/src/**/*.rs
      - miniscreenshot-softbuffer/src/**/*.rs
      - miniscreenshot-wgpu/src/**/*.rs
      - miniscreenshot-wayland/src/**/*.rs
      - miniscreenshot-skia/src/**/*.rs
      - miniscreenshot-vello/src/**/*.rs
      - miniscreenshot-x11/src/**/*.rs
      - miniscreenshot-portal/src/**/*.rs
    cmds:
      - cargo build --workspace

  docs:
    desc: Build rustdoc
    aliases:
      - doc
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo doc --workspace --no-deps --all-features --exclude miniscreenshot-portal
      - cargo doc -p miniscreenshot-portal --no-deps --features "tokio,blocking,async"

  docs:open:
    desc: Build rustdoc and open in browser
    aliases:
      - doc:open
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo doc --workspace --no-deps --all-features --exclude miniscreenshot-portal --open
      - cargo doc -p miniscreenshot-portal --no-deps --features "tokio,blocking,async" --open

  examples:
    desc: Build and run all headless examples
    deps:
      - examples:build
    cmds:
      - task: examples:core
      - task: examples:softbuffer
      - task: examples:wgpu
      - task: examples:skia
      - task: examples:vello

  examples:display:
    desc: Build and run display-dependent examples
    deps:
      - examples:build
    cmds:
      - task: examples:softbuffer:winit
      - task: examples:wayland
      - task: examples:x11
      - task: examples:portal

  examples:build:
    desc: Build all examples across the workspace (including feature-gated)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo build --workspace --all-features --examples --exclude miniscreenshot-portal
      - cargo build -p miniscreenshot-portal --all-targets --examples --features "tokio,blocking,async"

  examples:core:
    desc: Run the miniscreenshot core scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot --example core_scene_screenshot

  examples:softbuffer:
    desc: Run the miniscreenshot-softbuffer headless scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-softbuffer --example softbuffer_scene_screenshot

  examples:softbuffer:winit:
    desc: Run the miniscreenshot-softbuffer winit scene example (needs a display)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-softbuffer --example softbuffer_winit_scene_screenshot --features winit

  examples:wgpu:
    desc: Run the miniscreenshot-wgpu headless scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-wgpu --example wgpu_scene_screenshot

  examples:wayland:
    desc: "Run the miniscreenshot-wayland screen capture example (requires a wlroots-based Wayland compositor: Sway, Hyprland, weston, cage, ...)"
    summary: |
      Run the miniscreenshot-wayland screen capture example.

      Requirements:
        - An active Wayland session. The WAYLAND_DISPLAY environment variable
          must be set and point to a running compositor socket (check with
          `echo $WAYLAND_DISPLAY` and `echo $XDG_SESSION_TYPE`).
        - The compositor must implement the wlr-screencopy-unstable-v1 protocol.
          Supported compositors include wlroots-based ones (Sway, Hyprland,
          river, Wayfire, cage) as well as weston.
          GNOME/Mutter and KDE/KWin do NOT implement wlr-screencopy and will
          not work with this example.

      Common failures:

      1) failed to connect to Wayland compositor: Connection(NoCompositor)
         No Wayland socket was found. Typical causes:
           - You are logged into an X11 session (XDG_SESSION_TYPE=x11). Log
             out and pick a Wayland session, or use the workarounds below.
           - WAYLAND_DISPLAY is unset or points to a stale socket.

      2) failed to connect to Wayland compositor: NoScreencopyManager
         A Wayland compositor was reached, but it does not implement the
         wlr-screencopy-unstable-v1 protocol. This is expected on GNOME
         (Mutter) and KDE (KWin) — they use the XDG Desktop Portal screencast
         API instead and are not supported by this example. Switch to a
         wlroots-based compositor or use a nested one (see below).

      Workarounds for X11 sessions:
        - Start a nested compositor for testing, e.g.:
            weston &
            WAYLAND_DISPLAY=wayland-1 task examples:wayland
          (Use whichever WAYLAND_DISPLAY value weston prints.)
        - Or run `cage -- task examples:wayland` to launch a single-app
          Wayland session.
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-wayland --example wayland_scene_screenshot

  examples:x11:
    desc: "Run the miniscreenshot-x11 screen capture example (requires an X11 display: native X11, XWayland, Xephyr, or Xvfb)"
    summary: |
      Run the miniscreenshot-x11 screen capture example.

      Requirements:
        - A reachable X11 server. The DISPLAY environment variable must be set
          and point to a running X server (check with `echo $DISPLAY`).
        - Works under native X11, XWayland (e.g. `DISPLAY=:0` inside a Wayland
          session), or a nested Xephyr/Xvfb server.
        - When MIT-SHM is available, the fast-path shared-memory capture is used;
          otherwise it falls back to a plain XGetImage transfer.

      Common failures:

      1) X11 connection error: DisplayParsingError
         No DISPLAY variable was set, or the value is malformed. Make sure
         `echo $DISPLAY` prints something like `:0` or `localhost:10.0`.

      2) I/O error: Connection refused
         The X server at the given DISPLAY is not running or unreachable.

      Workarounds for headless CI:
        - Start a virtual framebuffer and use it:
            Xvfb :99 &
            DISPLAY=:99 task examples:x11
        - Or use Xephyr for a nested windowed X server:
            Xephyr :1 -screen 1280x720 &
            DISPLAY=:1 task examples:x11
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-x11 --example x11_scene_screenshot

  examples:skia:
    desc: Run the miniscreenshot-skia scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-skia --example skia_scene_screenshot

  examples:vello:
    desc: Run the miniscreenshot-vello scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-vello --example vello_scene_screenshot

  examples:portal:
    desc: "Run the miniscreenshot-portal screen capture example (requires a desktop session with XDG Desktop Portal)"
    summary: |
      Run the miniscreenshot-portal screen capture example.

      Requirements:
        - A running desktop session with $XDG_RUNTIME_DIR and a portal
          implementation (xdg-desktop-portal + a backend such as
          xdg-desktop-portal-gnome, -kde, -wlr, or -gtk).
        - Will pop up a confirmation dialog on GNOME; may or may not on
          KDE and wlroots depending on the backend's policy.
        - Works inside Flatpak/Snap sandboxes (unlike the wayland/x11 crates).

      Common failures:

      1) Portal error: zbus error
         No running portal session bus or xdg-desktop-portal service.
         Make sure you are in a desktop session with a portal backend.

      2) Screenshot request was cancelled by the user
         The user declined the portal confirmation dialog.
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-portal --example portal_scene_screenshot

  examples:portal:async:
    desc: "Run the miniscreenshot-portal async screen capture example (requires portal + tokio)"
    summary: |
      Run the miniscreenshot-portal async screen capture example.

      Same requirements as examples:portal, but runs the async variant
      using the tokio runtime.
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-portal --example portal_async_scene_screenshot --features async

  publish:dry:
    desc: Run cargo publish --dry-run for all workspace crates
    cmds:
      - task: publish:core:dry
      - task: publish:softbuffer:dry
      - task: publish:wgpu:dry
      - task: publish:wayland:dry
      - task: publish:skia:dry
      - task: publish:vello:dry
      - task: publish:x11:dry
      - task: publish:portal:dry

  publish:core:dry:
    desc: Run cargo publish --dry-run for miniscreenshot
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot

  publish:softbuffer:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-softbuffer
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-softbuffer

  publish:wgpu:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-wgpu
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-wgpu

  publish:wayland:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-wayland
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-wayland

  publish:skia:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-skia
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-skia

  publish:vello:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-vello
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-vello

  publish:x11:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-x11
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-x11

  publish:portal:dry:
    desc: Run cargo publish --dry-run for miniscreenshot-portal
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo publish --dry-run -p miniscreenshot-portal
