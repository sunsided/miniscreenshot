# https://github.com/go-task/task
version: "3"

tasks:
  fmt:
    desc: Format the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo fmt

  lint:
    desc: Lint the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  lint:fix:
    desc: Lint and auto-fix the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo clippy --workspace --all-targets --fix --allow-staged

  test:
    desc: Run all workspace tests
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo test --workspace

  test:core:
    desc: Run tests for the core miniscreenshot crate only
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo test -p miniscreenshot

  build:
    desc: Build the workspace
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    sources:
      - Cargo.lock
      - Cargo.toml
      - miniscreenshot/Cargo.toml
      - miniscreenshot-softbuffer/Cargo.toml
      - miniscreenshot-winit/Cargo.toml
      - miniscreenshot-wgpu/Cargo.toml
      - miniscreenshot-wayland/Cargo.toml
      - miniscreenshot-skia/Cargo.toml
      - miniscreenshot-vello/Cargo.toml
      - miniscreenshot/src/**/*.rs
      - miniscreenshot-softbuffer/src/**/*.rs
      - miniscreenshot-winit/src/**/*.rs
      - miniscreenshot-wgpu/src/**/*.rs
      - miniscreenshot-wayland/src/**/*.rs
      - miniscreenshot-skia/src/**/*.rs
      - miniscreenshot-vello/src/**/*.rs
    cmds:
      - cargo build --workspace

  docs:
    desc: Build rustdoc
    aliases:
      - doc
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo doc --workspace --no-deps --all-features

  docs:open:
    desc: Build rustdoc and open in browser
    aliases:
      - doc:open
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo doc --workspace --no-deps --all-features --open

  examples:
    desc: Build and run all headless examples
    deps:
      - examples:build
    cmds:
      - task: examples:core
      - task: examples:softbuffer
      - task: examples:wgpu
      - task: examples:skia
      - task: examples:vello

  examples:build:
    desc: Build all examples across the workspace (including feature-gated)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo build --workspace --all-features --examples

  examples:core:
    desc: Run the miniscreenshot core scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot --example core_scene_screenshot

  examples:softbuffer:
    desc: Run the miniscreenshot-softbuffer headless scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-softbuffer --example softbuffer_scene_screenshot

  examples:winit:
    desc: Run the miniscreenshot-winit window scene example (needs a display)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-winit --example winit_scene_screenshot

  examples:wgpu:
    desc: Run the miniscreenshot-wgpu headless scene example
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-wgpu --example wgpu_scene_screenshot

  examples:wayland:
    desc: Run the miniscreenshot-wayland screen capture example (needs Wayland compositor)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-wayland --example wayland_scene_screenshot

  examples:skia:
    desc: Run the miniscreenshot-skia scene example (requires --features skia)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-skia --example skia_scene_screenshot --features skia

  examples:vello:
    desc: Run the miniscreenshot-vello scene example (requires --features vello)
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run -p miniscreenshot-vello --example vello_scene_screenshot --features vello
